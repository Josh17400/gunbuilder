<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Gunbuilder</title>
  <link rel="stylesheet" href="./style.css" />
  <script>
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    // Build stamp — MUST match src/version.js. GitHub Pages caches files for
    // 10 min, so a deploy can briefly serve mixed old/new files; main.js
    // compares this against its imported VERSION and self-heals (see main.js).
    window.__buildStamp = "0.3.0";
  </script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"></div>
  <div id="touch"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
